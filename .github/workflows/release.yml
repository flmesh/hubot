name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: node

      - name: Log in to GitHub Container Registry
        if: steps.release.outputs.release_created == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive release tags
        if: steps.release.outputs.release_created == 'true'
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          short_sha="$(printf '%s' '${{ steps.release.outputs.sha }}' | cut -c1-7)"

          {
            echo "sha_tag=sha-${short_sha}"
            echo "version=${{ steps.release.outputs.version }}"
            echo "major=${{ steps.release.outputs.major }}"
            echo "minor=${{ steps.release.outputs.minor }}"
          } >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata for release tags
        if: steps.release.outputs.release_created == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.tags.outputs.sha_tag }}
            type=raw,value=${{ steps.tags.outputs.version }}
            type=raw,value=${{ steps.tags.outputs.major }}.${{ steps.tags.outputs.minor }}
            type=raw,value=${{ steps.tags.outputs.major }}

      - name: Set up Docker Buildx
        if: steps.release.outputs.release_created == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push release Docker image
        if: steps.release.outputs.release_created == 'true'
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CREATED=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            REVISION=${{ steps.release.outputs.sha }}
            VERSION=${{ steps.release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        if: steps.release.outputs.release_created == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
