services:
  redis:
    image: redis:8-alpine
    container_name: hubot-redis-test
    restart: "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  hubot:
    build:
      context: .
      dockerfile: Dockerfile
    image: hubot-discord:local
    container_name: hubot-discord-test
    env_file:
      - .env
    environment:
      HUBOT_NAME: ${HUBOT_NAME:-hubot}
      HUBOT_LOG_LEVEL: ${HUBOT_LOG_LEVEL:-info}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOKI_URL: ${LOKI_URL:-http://host.docker.internal:3100}
      LOKI_USERNAME: ${LOKI_USERNAME:-}
      LOKI_PASSWORD: ${LOKI_PASSWORD:-}
      NODE_LOGS_CACHE_TTL_SECONDS: ${NODE_LOGS_CACHE_TTL_SECONDS:-30}
      MONGO_HOST: ${MONGO_HOST:-host.docker.internal}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USERNAME: ${MONGO_USERNAME:-}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE:-mqtt}
      MONGO_URL: ${MONGO_URL:-}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-mqtt}
      MQTT_ADMIN_GUILD_ID: ${MQTT_ADMIN_GUILD_ID:-}
      MQTT_ADMIN_ROLE_IDS: ${MQTT_ADMIN_ROLE_IDS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
    init: true
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
